<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TestLens — AI failure analysis</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f7fa; color: #1a1a2e; line-height: 1.5;
  }
  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 1.6rem; margin: 0 0 .3rem; }
  .subtitle { color: #666; margin: 0 0 2rem; font-size: .9rem; }

  .card {
    background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.08);
    padding: 1.25rem; margin-bottom: 1rem;
  }
  .card h2 { font-size: 1rem; margin: 0 0 1rem; }

  label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: .3rem; }
  input, textarea {
    width: 100%; padding: .5rem .65rem; border: 1px solid #d0d5dd;
    border-radius: 6px; font-size: .9rem; font-family: inherit;
  }
  input:focus, textarea:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
  textarea { resize: vertical; min-height: 100px; font-family: "SF Mono", "Fira Code", monospace; font-size: .8rem; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: .75rem; }
  @media (max-width: 540px) { .form-row { grid-template-columns: 1fr; } }

  .file-label { cursor: pointer; }
  .file-label input[type=file] { display: none; }
  .file-btn {
    display: inline-flex; align-items: center; gap: .4rem;
    padding: .5rem 1rem; border: 1px dashed #6366f1; border-radius: 6px;
    color: #6366f1; font-size: .9rem; cursor: pointer;
  }
  .file-btn:hover { background: #eef2ff; }

  button[type=submit] {
    width: 100%; padding: .7rem; border: none; border-radius: 6px;
    background: #6366f1; color: #fff; font-size: 1rem; font-weight: 600;
    cursor: pointer;
  }
  button[type=submit]:hover { background: #4f46e5; }
  button[type=submit]:disabled { opacity: .5; cursor: not-allowed; }

  .error { color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; border-radius: 6px; padding: .75rem 1rem; margin-bottom: 1rem; }
  .error:empty { display: none; }

  .result-card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
  .result-card h3 { font-size: .95rem; margin: 0 0 .5rem; }
  .result-card .summary { font-size: .9rem; color: #374151; margin-bottom: .75rem; }
  .badge {
    display: inline-block; padding: .15rem .55rem; border-radius: 99px;
    font-size: .75rem; font-weight: 600;
  }
  .badge-product { background: #fef3c7; color: #92400e; }
  .badge-api { background: #fee2e2; color: #991b1b; }
  .badge-environment { background: #e0e7ff; color: #3730a3; }
  .badge-infrastructure { background: #f3e8ff; color: #6b21a8; }
  .badge-network { background: #e0f2fe; color: #075985; }
  .badge-automation { background: #fce7f3; color: #9d174d; }
  .badge-flaky { background: #fef9c3; color: #854d0e; }
  .badge-unknown { background: #f3f4f6; color: #374151; }
  .meta { display: flex; gap: .75rem; align-items: center; margin-bottom: .5rem; }
  .confidence { font-size: .8rem; color: #666; }
  .list-label { font-size: .8rem; font-weight: 600; color: #6b7280; margin: .5rem 0 .2rem; }
  ul { margin: 0; padding-left: 1.2rem; font-size: .85rem; color: #4b5563; }
  ul li { margin-bottom: .2rem; }
  .spinner { display: none; }
  .loading .spinner { display: inline-block; }
  .loading .label-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner::after {
    content: ""; display: inline-block; width: 1em; height: 1em;
    border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
    border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle;
  }
  .or-divider { text-align: center; color: #9ca3af; font-size: .8rem; margin: .5rem 0; }
</style>
</head>
<body>
<div class="container">
  <h1>TestLens</h1>
  <p class="subtitle">Upload a Playwright JSON report and get AI-powered failure analysis. Bring your own LLM API key.</p>

  <form id="analyzeForm">
    <div class="card">
      <h2>LLM configuration</h2>
      <div class="form-row">
        <div>
          <label for="apiKey">API key</label>
          <input type="password" id="apiKey" placeholder="sk-... or gf_...">
        </div>
        <div>
          <label for="model">Model</label>
          <input type="text" id="model" value="gateframe/gemini-2.5-flash">
        </div>
      </div>
      <div>
        <label for="baseUrl">Base URL</label>
        <input type="text" id="baseUrl" value="https://router.gateframe.ai/v1">
      </div>
    </div>

    <div class="card">
      <h2>Playwright report</h2>
      <label class="file-label">
        <span class="file-btn">&#128194; Choose JSON file</span>
        <input type="file" id="fileInput" accept=".json">
      </label>
      <span id="fileName" style="font-size:.8rem;color:#666;margin-left:.5rem;"></span>
      <div class="or-divider">— or paste JSON below —</div>
      <textarea id="reportText" placeholder='{"suites": [...]}'></textarea>
    </div>

    <button type="submit" id="submitBtn">
      <span class="label-text">Analyze</span>
      <span class="spinner"></span>
    </button>
  </form>

  <div id="error" class="error"></div>
  <div id="results"></div>
</div>

<script>
const form = document.getElementById("analyzeForm");
const fileInput = document.getElementById("fileInput");
const reportText = document.getElementById("reportText");
const fileName = document.getElementById("fileName");
const errorDiv = document.getElementById("error");
const resultsDiv = document.getElementById("results");
const submitBtn = document.getElementById("submitBtn");

fileInput.addEventListener("change", () => {
  const file = fileInput.files[0];
  if (file) {
    fileName.textContent = file.name;
    const reader = new FileReader();
    reader.onload = (e) => { reportText.value = e.target.result; };
    reader.readAsText(file);
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  errorDiv.textContent = "";
  resultsDiv.innerHTML = "";
  submitBtn.classList.add("loading");
  submitBtn.disabled = true;

  try {
    const report = reportText.value;
    if (!report.trim()) { throw new Error("Paste or upload a Playwright JSON report."); }

    const res = await fetch("/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        report,
        api_key: document.getElementById("apiKey").value || null,
        base_url: document.getElementById("baseUrl").value || null,
        model: document.getElementById("model").value || null,
      }),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || `Server error (${res.status})`);
    }

    const data = await res.json();
    if (!data.length) {
      resultsDiv.innerHTML = '<div class="card">No failed tests found. All tests passed!</div>';
      return;
    }

    data.forEach((a) => {
      const cat = a.suspected_category.replace(/\s+/g, "-");
      const conf = (a.confidence * 100).toFixed(0);
      resultsDiv.innerHTML += `
        <div class="result-card">
          <h3>${esc(a.test_title)}</h3>
          <div class="meta">
            <span class="badge badge-${cat}">${esc(a.suspected_category)}</span>
            <span class="confidence">${conf}% confidence</span>
          </div>
          <div class="summary">${esc(a.summary)}</div>
          ${listBlock("Evidence", a.evidence)}
          ${listBlock("Next steps", a.next_steps)}
        </div>`;
    });
  } catch (err) {
    errorDiv.textContent = err.message;
  } finally {
    submitBtn.classList.remove("loading");
    submitBtn.disabled = false;
  }
});

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function listBlock(label, items) {
  if (!items || !items.length) return "";
  return `<div class="list-label">${label}</div><ul>${items.map(i => `<li>${esc(i)}</li>`).join("")}</ul>`;
}
</script>
</body>
</html>
